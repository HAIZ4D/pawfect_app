  <!-- Loading styles -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #FFF4DB;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #FFB74D 0%, #FFA726 50%, #FDA002 100%);
    }
    .loading-logo {
      width: 120px;
      height: 120px;
      background-color: white;
      border-radius: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      margin-bottom: 24px;
    }
    .loading-logo svg {
      width: 60px;
      height: 60px;
    }
    .loading-text {
      color: #2D3142;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .loading-subtitle {
      color: rgba(45, 49, 66, 0.8);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }
    .loading-spinner {
      margin-top: 32px;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading" class="loading-container">

      </svg>
    </div>
    <div class="loading-text">Pawfect</div>
    <div class="loading-subtitle">AI-Powered Pet Healthcare</div>
    <div class="loading-spinner"></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) {
        loading.style.transition = 'opacity 0.3s';
        loading.style.opacity = '0';
        setTimeout(function() {
          loading.remove();
        }, 300);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
