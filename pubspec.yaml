name: pawfect_app
description: AI-Powered Pet Healthcare Application
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Firebase - Updated for web compatibility
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  firebase_analytics: ^11.4.0

  # ML & AI
  google_generative_ai: ^0.4.3
  image: ^4.1.3

  # Camera & Media (conditional for web)
  camera: ^0.10.5
  image_picker: ^1.0.5

  # UI/UX
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.1
  url_launcher: ^6.2.1
  share_plus: ^7.2.1
  pdf: ^3.10.7
  qr_flutter: ^4.1.0
  path_provider: ^2.1.1
  flutter_dotenv: ^5.1.0

  # Authentication
  google_sign_in: ^6.2.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env
